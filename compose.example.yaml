# periodic-bot — Telegram bot (outbound-only, no ports published).
#
# Copy this file to compose.yaml, then:
#   cp .env.example .env  # edit .env and set TELEGRAM_TOKEN=<your token>
#   docker compose pull && docker compose up -d   # use the released image
#   # or:
#   docker compose up -d --build                  # build from the current checkout

services:
  periodic-bot:
    image: ghcr.io/cheminfo/periodic-bot:latest
    build: .
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1
    pids_limit: 256
    ulimits:
      core: 0
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    env_file: .env
